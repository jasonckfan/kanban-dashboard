<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes Kanban Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .kanban-column { min-height: 400px; }
        .task-card { transition: all 0.2s ease; cursor: pointer; }
        .task-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .status-todo { border-left: 4px solid #6b7280; }
        .status-doing { border-left: 4px solid #3b82f6; }
        .status-done { border-left: 4px solid #10b981; }
        .status-blocked { border-left: 4px solid #ef4444; }
        .loading { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center text-white font-bold text-lg">H</div>
                    <div>
                        <h1 class="text-xl font-bold text-gray-900">Hermes Kanban</h1>
                        <p class="text-sm text-gray-500">Live Dashboard</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-sm text-gray-500">
                        <span id="task-count">0 tasks</span> • 
                        <span id="last-updated">Loading...</span>
                    </div>
                    <button onclick="loadData()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition text-sm font-medium flex items-center space-x-2">
                        <span>🔄</span>
                        <span>Refresh</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Stats -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6" id="stats-container">
            <div class="bg-white rounded-xl shadow-sm p-4 border border-gray-100">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500">Total</p>
                        <p class="text-2xl font-bold text-gray-900" id="stat-total">-</p>
                    </div>
                    <div class="w-10 h-10 bg-gray-100 rounded-lg flex items-center justify-center text-gray-600">📋</div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-4 border border-gray-100">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500">To Do</p>
                        <p class="text-2xl font-bold text-gray-600" id="stat-todo">-</p>
                    </div>
                    <div class="w-10 h-10 bg-gray-100 rounded-lg flex items-center justify-center text-gray-500">⏳</div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-4 border border-gray-100">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500">In Progress</p>
                        <p class="text-2xl font-bold text-blue-600" id="stat-doing">-</p>
                    </div>
                    <div class="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center text-blue-600">🔥</div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-4 border border-gray-100">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500">Done</p>
                        <p class="text-2xl font-bold text-green-600" id="stat-done">-</p>
                    </div>
                    <div class="w-10 h-10 bg-green-50 rounded-lg flex items-center justify-center text-green-600">✅</div>
                </div>
            </div>
        </div>

        <!-- Kanban Board -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200 bg-gray-50 flex items-center justify-between">
                <h2 class="text-lg font-semibold text-gray-900">📊 Kanban Board</h2>
                <div id="loading-indicator" class="text-sm text-gray-500 loading hidden">Loading...</div>
            </div>
            <div class="p-6">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <!-- To Do -->
                    <div class="kanban-column bg-gray-50 rounded-lg p-4">
                        <div class="flex items-center justify-between mb-3">
                            <h3 class="font-semibold text-gray-700 flex items-center">
                                <span class="w-2 h-2 bg-gray-400 rounded-full mr-2"></span>
                                To Do
                            </h3>
                            <span class="text-xs bg-gray-200 text-gray-600 px-2 py-1 rounded-full" id="count-todo">0</span>
                        </div>
                        <div id="column-todo" class="space-y-2 min-h-[200px]">
                            <div class="text-center text-gray-400 py-8 text-sm">Loading...</div>
                        </div>
                    </div>

                    <!-- In Progress -->
                    <div class="kanban-column bg-blue-50 rounded-lg p-4">
                        <div class="flex items-center justify-between mb-3">
                            <h3 class="font-semibold text-blue-700 flex items-center">
                                <span class="w-2 h-2 bg-blue-500 rounded-full mr-2"></span>
                                In Progress
                            </h3>
                            <span class="text-xs bg-blue-200 text-blue-700 px-2 py-1 rounded-full" id="count-doing">0</span>
                        </div>
                        <div id="column-doing" class="space-y-2 min-h-[200px]">
                            <div class="text-center text-blue-300 py-8 text-sm">Loading...</div>
                        </div>
                    </div>

                    <!-- Done -->
                    <div class="kanban-column bg-green-50 rounded-lg p-4">
                        <div class="flex items-center justify-between mb-3">
                            <h3 class="font-semibold text-green-700 flex items-center">
                                <span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span>
                                Done
                            </h3>
                            <span class="text-xs bg-green-200 text-green-700 px-2 py-1 rounded-full" id="count-done">0</span>
                        </div>
                        <div id="column-done" class="space-y-2 min-h-[200px]">
                            <div class="text-center text-green-300 py-8 text-sm">Loading...</div>
                        </div>
                    </div>

                    <!-- Blocked -->
                    <div class="kanban-column bg-red-50 rounded-lg p-4">
                        <div class="flex items-center justify-between mb-3">
                            <h3 class="font-semibold text-red-700 flex items-center">
                                <span class="w-2 h-2 bg-red-500 rounded-full mr-2"></span>
                                Blocked
                            </h3>
                            <span class="text-xs bg-red-200 text-red-700 px-2 py-1 rounded-full" id="count-blocked">0</span>
                        </div>
                        <div id="column-blocked" class="space-y-2 min-h-[200px]">
                            <div class="text-center text-red-300 py-8 text-sm">Loading...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="kanban-data.js"></script>
    <script>
        const STATUS_LABELS = {
            'todo': 'To Do',
            'doing': 'In Progress', 
            'done': 'Done',
            'blocked': 'Blocked'
        };

        function formatDate(timestamp) {
            if (!timestamp) return '-';
            const date = new Date(timestamp * 1000);
            return date.toLocaleDateString('zh-HK') + ' ' + date.toLocaleTimeString('zh-HK', { hour: '2-digit', minute: '2-digit' });
        }

        function renderTaskCard(task) {
            const priorityColors = {
                5: 'bg-red-100 text-red-700',
                4: 'bg-orange-100 text-orange-700',
                3: 'bg-yellow-100 text-yellow-700',
                2: 'bg-blue-100 text-blue-700',
                1: 'bg-gray-100 text-gray-700',
                0: 'bg-gray-100 text-gray-700'
            };
            const priorityClass = priorityColors[task.priority] || priorityColors[0];
            
            return `
                <div class="task-card bg-white rounded-lg p-3 shadow-sm border border-gray-200 status-${task.status}">
                    <div class="flex items-start justify-between mb-2">
                        <span class="text-xs font-mono text-gray-400">${task.id.substring(0, 8)}</span>
                        ${task.priority > 0 ? `<span class="text-xs px-1.5 py-0.5 rounded ${priorityClass}">P${task.priority}</span>` : ''}
                    </div>
                    <h4 class="font-medium text-gray-900 text-sm mb-1">${task.title}</h4>
                    ${task.assignee ? `<div class="text-xs text-gray-500">👤 ${task.assignee}</div>` : ''}
                </div>
            `;
        }

        function loadData() {
            const loading = document.getElementById('loading-indicator');
            loading.classList.remove('hidden');
            
            // Check if data exists
            if (typeof KANBAN_DATA === 'undefined') {
                console.error('KANBAN_DATA not loaded');
                loading.textContent = 'Error: Data not loaded';
                return;
            }
            
            const tasks = KANBAN_DATA.tasks || [];
            
            // Update stats
            document.getElementById('stat-total').textContent = tasks.length;
            document.getElementById('stat-todo').textContent = tasks.filter(t => t.status === 'todo').length;
            document.getElementById('stat-doing').textContent = tasks.filter(t => t.status === 'doing').length;
            document.getElementById('stat-done').textContent = tasks.filter(t => t.status === 'done').length;
            
            document.getElementById('task-count').textContent = `${tasks.length} tasks`;
            document.getElementById('last-updated').textContent = KANBAN_DATA.generated_at 
                ? new Date(KANBAN_DATA.generated_at).toLocaleString('zh-HK')
                : 'Unknown';
            
            // Update column counts
            document.getElementById('count-todo').textContent = tasks.filter(t => t.status === 'todo').length;
            document.getElementById('count-doing').textContent = tasks.filter(t => t.status === 'doing').length;
            document.getElementById('count-done').textContent = tasks.filter(t => t.status === 'done').length;
            document.getElementById('count-blocked').textContent = tasks.filter(t => t.status === 'blocked').length;
            
            // Render columns
            const columns = {
                'todo': document.getElementById('column-todo'),
                'doing': document.getElementById('column-doing'),
                'done': document.getElementById('column-done'),
                'blocked': document.getElementById('column-blocked')
            };
            
            Object.keys(columns).forEach(status => {
                const columnTasks = tasks.filter(t => t.status === status);
                if (columnTasks.length === 0) {
                    columns[status].innerHTML = `<div class="text-center text-gray-400 py-8 text-sm">No tasks</div>`;
                } else {
                    columns[status].innerHTML = columnTasks.map(renderTaskCard).join('');
                }
            });
            
            loading.classList.add('hidden');
            console.log('Dashboard updated:', tasks.length, 'tasks');
        }

        // Load on page load
        document.addEventListener('DOMContentLoaded', loadData);
        
        // Auto-refresh every 30 seconds
        setInterval(loadData, 30000);
    </script>
</body>
</html>
