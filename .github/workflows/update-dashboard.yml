name: Update Kanban Dashboard

on:
  # Run every hour
  schedule:
    - cron: '0 * * * *'
  # Run on push to main
  push:
    branches: [ main ]
  # Manual trigger
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Download kanban database
      run: |
        # You'll need to set up a way to get the kanban.db file
        # Options:
        # 1. Use SCP/SFTP to copy from your machine
        # 2. Use a cloud sync service (Dropbox, iCloud, etc.)
        # 3. Use Git LFS to store a copy
        # 4. Use a webhook to push updates
        
        # For now, create a placeholder
        echo "Please configure database sync in this workflow"
        mkdir -p ~/.hermes
        touch ~/.hermes/kanban.db
        
    - name: Build dashboard
      run: |
        python build.py
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        exclude_assets: '.github,build.py,README.md'
